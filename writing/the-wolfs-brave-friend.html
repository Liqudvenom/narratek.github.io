*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--bg2:#111113;--line:#2a2a2f;--text:#e8e8ea;--muted:#6b6b72;--accent:#c8f55a;--font-display:'Syne',sans-serif;--font-mono:'DM Mono',monospace;--font-serif:'Lora',serif}

.actions a:hover{border-color:var(--accent)}
.placeholder{font-family:var(--font-mono);font-size:.75rem;color:var(--muted);padding:1.5rem;border:1px dashed var(--line);background:var(--bg2);line-height:1.75}
.back{display:inline-block;margin-top:2rem;font-family:var(--font-mono);font-size:.75rem;color:var(--accent);text-decoration:none;border:1px solid var(--line);padding:.5rem 1rem}
